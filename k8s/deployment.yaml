apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-aks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-aks-app
  template:
    metadata:
      labels:
        app: java-aks-app
    spec:
      containers:
        - name: java-aks-app
          image: ram1993/java-aks-app:latest
          ports:
            - containerPort: 8080
